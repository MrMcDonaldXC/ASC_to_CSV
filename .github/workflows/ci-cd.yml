name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  release:
    types: [ created ]

env:
  PYTHON_VERSION: '3.11'

jobs:
  # ============================================================================
  # 代码质量检查
  # ============================================================================
  lint:
    name: 代码质量检查
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install flake8 mypy pytest
          pip install -r requirements.txt

      - name: Flake8代码检查
        run: |
          flake8 . --max-line-length=120 --exclude=venv,build,dist,__pycache__,tests --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --max-line-length=120 --exclude=venv,build,dist,__pycache__,tests --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: MyPy类型检查
        run: |
          mypy . --ignore-missing-imports --exclude "venv|build|dist|tests"
        continue-on-error: true

  # ============================================================================
  # 单元测试
  # ============================================================================
  test:
    name: 单元测试 (Python ${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ['3.9', '3.10', '3.11', '3.12']

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov
          pip install -r requirements.txt

      - name: 运行单元测试
        run: |
          pytest tests/ -v --tb=short --cov=. --cov-report=xml --cov-report=term-missing

      - name: 上传测试覆盖率报告
        uses: codecov/codecov-action@v4
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  # ============================================================================
  # 构建应用
  # ============================================================================
  build:
    name: 构建应用
    runs-on: windows-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 转换图标
        run: python convert_icon.py
        continue-on-error: true

      - name: 构建EXE
        run: pyinstaller main_app.spec --clean

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: ASCtoCSV-Windows
          path: dist/ASCtoCSV.exe
          retention-days: 30

  # ============================================================================
  # 发布Release
  # ============================================================================
  release:
    name: 发布Release
    runs-on: windows-latest
    needs: build
    if: github.event_name == 'release'

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 下载构建产物
        uses: actions/download-artifact@v4
        with:
          name: ASCtoCSV-Windows
          path: dist

      - name: 创建发布包
        run: |
          Compress-Archive -Path dist/ASCtoCSV.exe -DestinationPath ASCtoCSV-${{ github.event.release.tag_name }}.zip

      - name: 上传Release资产
        uses: softprops/action-gh-release@v1
        with:
          files: ASCtoCSV-${{ github.event.release.tag_name }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============================================================================
  # 依赖安全检查
  # ============================================================================
  security:
    name: 依赖安全检查
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 安装安全检查工具
        run: |
          pip install safety pip-audit

      - name: Safety安全检查
        run: safety check -r requirements.txt
        continue-on-error: true

      - name: Pip-audit安全检查
        run: pip-audit -r requirements.txt
        continue-on-error: true
